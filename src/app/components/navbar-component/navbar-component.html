<!-- src/app/core/components/navbar/navbar.component.html -->
<header
  class="sticky top-0 z-50 w-full border-b border-primary/10 bg-crema/90 backdrop-blur-md px-6 md:px-12 py-4 transition-shadow"
  [class.shadow-sm]="isScrolled()"
>
  <div class="max-w-[1400px] mx-auto flex items-center justify-between">
    <div class="flex items-center gap-10">
      <a routerLink="/" class="flex items-center gap-2 text-primary">
        <span class="material-symbols-outlined text-3xl">pets</span>
        <span class="text-natural-text text-xl font-extrabold tracking-tight">Patitas Conectadas</span>
      </a>

      <nav class="hidden lg:flex items-center gap-8">
        @for (link of navLinks; track link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="text-primary font-bold border-b-2 border-primary/30"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            class="text-sm font-medium hover:text-primary transition-colors"
          >
            {{ link.label }}
          </a>
        }
      </nav>
    </div>
    <div class="flex items-center gap-4">
      <a routerLink="/panel"
        class="px-5 py-2 text-sm font-semibold text-natural-text hover:text-primary transition-colors">
        Panel
      </a>
      <a routerLink="/perfil"
        class="px-5 py-2 bg-primary text-white text-sm font-bold rounded-full hover:bg-sage-dark transition-all shadow-sm">
        Mi Cuenta
      </a>

      <button
        (click)="toggleMobileMenu()"
        class="lg:hidden p-2 text-primary hover:bg-sage-light rounded-full transition-colors"
        aria-label="Abrir menú"
      >
        <span class="material-symbols-outlined">
          {{ isMobileMenuOpen() ? 'close' : 'menu' }}
        </span>
      </button>
    </div>

  </div>

  <!-- Menu para movil -->
  @if (isMobileMenuOpen()) {
    <nav class="lg:hidden mt-4 pb-4 border-t border-primary/10 pt-4 flex flex-col gap-4">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="text-primary font-bold"
          (click)="toggleMobileMenu()"
          class="text-sm font-medium hover:text-primary transition-colors px-2"
        >
          {{ link.label }}
        </a>
      }
      <a routerLink="/panel" (click)="toggleMobileMenu()"
        class="text-sm font-medium hover:text-primary transition-colors px-2">
        Panel
      </a>
      <a routerLink="/perfil" (click)="toggleMobileMenu()"
        class="text-sm font-bold text-primary px-2">
        Mi Cuenta
      </a>
    </nav>
  }
</header>
