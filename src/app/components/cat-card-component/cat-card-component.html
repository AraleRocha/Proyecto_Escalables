<div class="group bg-white rounded-lg overflow-hidden border border-primary/5 shadow-sm hover:shadow-md transition-shadow">
  <div class="relative aspect-[4/5] overflow-hidden bg-sage-light">
    <img
      [src]="cat.photo"
      [alt]="cat.name"
      class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
    />
  </div>

  <div class="p-6">
    <div class="flex justify-between items-start mb-2">
      <h3 class="text-xl font-bold text-natural-text">{{ cat.name }}</h3>
      <span class="text-sm font-medium text-primary/60 italic">{{ cat.age }}</span>
    </div>
    <p class="text-sm text-primary/80 mb-6 line-clamp-2">{{ cat.story }}</p>
    <a
      [routerLink]="['/adoptar', cat.id]"
      class="block w-full py-3 border border-primary/20 rounded text-center font-bold text-xs uppercase tracking-widest text-primary group-hover:bg-primary group-hover:text-white transition-all"
    >Ver Perfil Completo
    </a>
  </div>
</div>
