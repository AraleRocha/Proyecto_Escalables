<footer class="bg-white mt-32 py-16 border-t border-primary/10">
  <div class="max-w-[1400px] mx-auto px-6 md:px-12">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 mb-16">
      <div class="col-span-1">
        <a routerLink="/" class="flex items-center gap-2 text-primary mb-6">
          <span class="material-symbols-outlined text-2xl">pets</span>
          <span class="text-lg font-extrabold tracking-tight text-natural-text">Patitas Conectadas</span>
        </a>
        <p class="text-sm text-primary/70 leading-relaxed mb-6">
          Dedicados a encontrar hogares amorosos para cada gato rescatado. Tu apoyo hace la diferencia.
        </p>
        <div class="flex gap-4">
          <a href="#" aria-label="Compartir" class="text-primary/60 hover:text-primary transition-colors">
            <span class="material-symbols-outlined">share</span>
          </a>
        </div>
      </div>
      <!--Relleno para que no se vea tan vacío -->
      <div>
        <h4 class="text-xs uppercase tracking-[0.2em] font-extrabold text-primary mb-6">Organización</h4>
        <ul class="space-y-4 text-sm font-medium text-primary/70">
          @for (item of organization; track $index) {
            <li>
              <a [routerLink]="item.path" class="hover:text-primary transition-colors">{{ item.label }}</a>
            </li>
          }
        </ul>
      </div>
    </div>
    <div class="flex flex-col md:flex-row justify-center items-center gap-6 pt-12 border-t border-primary/5">
      <p class="text-[11px] uppercase tracking-[0.2em] text-primary/40">
        © {{ currentYear }} Patitas Conectadas. Todos los derechos reservados.
      </p>
    </div>
  </div>
</footer>
