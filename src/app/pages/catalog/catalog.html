<div class="max-w-[1400px] mx-auto px-6 md:px-12 py-4" id="catalogo">
  <div class="flex flex-col lg:flex-row gap-12">

    <app-filters-component (filtersChanged)="onFiltersChanged($event)" />

    <section class="flex-1">
      <div class="flex items-center justify-end mb-10 border-b border-primary/10 pb-4">
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
        @for (cat of cats(); track cat.id) {
          <app-cat-card-component [cat]="cat" />
        }@empty {
          <div class="col-span-3 text-center py-20 text-primary/50">
            <span class="material-symbols-outlined text-5xl mb-4 block">search_off</span>
            <p class="font-medium">No se encontraron gatos con esos filtros.</p>
          </div>
        }
      </div>
    </section>
  </div>
</div>
